<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN STYLE - Premium Clothing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-spinner"></div>
    </div>
    <nav class="navbar">
        <a href="index.html" class="logo">URBAN STYLE</a>
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="feedback.html">Reviews</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li class="cart-icon">
                <a href="cart.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>FALL COLLECTION 2024</h1>
            <p>Discover the latest trends in urban fashion. Premium quality, exceptional style.</p>
            <a href="shop.html" class="btn btn-primary pulse">Shop Now</a>
        </div>
    </section>

    <section class="products-section">
        <h2 class="section-title">FEATURED PRODUCTS</h2>
        <div class="products-grid" id="featuredProducts"></div>
    </section>

    <section class="products-section" style="background: var(--bg-secondary);">
        <h2 class="section-title">SHOP BY CATEGORY</h2>
        <div class="products-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
            <div class="product-card" onclick="window.location.href='shop.html?category=tshirts'">
                <img src="https://via.placeholder.com/300x400" alt="T-Shirts" class="product-image">
                <div class="product-info">
                    <h3 class="product-title">T-SHIRTS</h3>
                </div>
            </div>
            <div class="product-card" onclick="window.location.href='shop.html?category=jeans'">
                <img src="https://via.placeholder.com/300x400" alt="Jeans" class="product-image">
                <div class="product-info">
                    <h3 class="product-title">JEANS</h3>
                </div>
            </div>
            <div class="product-card" onclick="window.location.href='shop.html?category=jackets'">
                <img src="https://via.placeholder.com/300x400" alt="Jackets" class="product-image">
                <div class="product-info">
                    <h3 class="product-title">JACKETS</h3>
                </div>
            </div>
            <div class="product-card" onclick="window.location.href='shop.html?category=accessories'">
                <img src="https://via.placeholder.com/300x400" alt="Accessories" class="product-image">
                <div class="product-info">
                    <h3 class="product-title">ACCESSORIES</h3>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
